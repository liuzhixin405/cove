name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: windows, arch: amd64, ext: .exe, format: zip }
          - { os: linux,   arch: amd64, ext: '',    format: tar.gz }
          - { os: darwin,  arch: amd64, ext: '',    format: tar.gz }
          - { os: darwin,  arch: arm64, ext: '',    format: tar.gz }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="v${{ inputs.version }}"
          else
            V="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${V}" >> $GITHUB_OUTPUT
          echo "plain=${V#v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build binary
        id: build
        run: |
          NAME="agentgo-${{ steps.version.outputs.tag }}-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.ext }}"
          cd agent
          go build \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.plain }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.GitCommit=$(git rev-parse --short HEAD)" \
            -o "../${NAME}" \
            ./cmd/agentgo
          echo "binary=${NAME}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package and checksum
        id: package
        run: |
          BINARY="${{ steps.build.outputs.binary }}"
          BASE="agentgo-${{ steps.version.outputs.tag }}-${{ matrix.target.os }}-${{ matrix.target.arch }}"

          if [ "${{ matrix.target.format }}" = "zip" ]; then
            zip "${BASE}.zip" "${BINARY}"
            ARTIFACT="${BASE}.zip"
          else
            tar -czf "${BASE}.tar.gz" "${BINARY}"
            ARTIFACT="${BASE}.tar.gz"
          fi

          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          echo "artifact=${ARTIFACT}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          find dist -name '*.sha256' -exec cat {} \; > dist/checksums.txt
          find dist -name '*.sha256' -delete

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: agentgo ${{ steps.version.outputs.tag }}
          files: |
            dist/agentgo-*
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'rc') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
