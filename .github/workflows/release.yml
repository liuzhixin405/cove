name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { os: windows, arch: amd64, ext: .exe, format: zip }
          - { os: linux, arch: amd64, ext: '', format: tar.gz }
          - { os: darwin, arch: amd64, ext: '', format: tar.gz }
          - { os: darwin, arch: arm64, ext: '', format: tar.gz }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION_PLAIN="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_plain=$VERSION_PLAIN" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum

      - name: Get git commit
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binary
        working-directory: agent
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: '0'
        run: |
          BINARY_NAME="agentgo-${{ steps.version.outputs.version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.ext }}"
          go build \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.version_plain }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.GitCommit=${{ steps.commit.outputs.sha }}" \
            -o "${BINARY_NAME}" \
            ./cmd/agentgo

          # Package
          if [ "${{ matrix.target.format }}" = "zip" ]; then
            zip "agentgo-${{ steps.version.outputs.version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.zip" "${BINARY_NAME}"
            echo "artifact=agentgo-${{ steps.version.outputs.version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.zip" >> $GITHUB_OUTPUT
          else
            tar -czf "agentgo-${{ steps.version.outputs.version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz" "${BINARY_NAME}"
            echo "artifact=agentgo-${{ steps.version.outputs.version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Generate checksum
        working-directory: agent
        run: |
          sha256sum "${{ steps.build.outputs.artifact }}" > "${{ steps.build.outputs.artifact }}.sha256"
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            agent/${{ steps.build.outputs.artifact }}
            agent/${{ steps.build.outputs.artifact }}.sha256
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="v${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        working-directory: dist
        run: |
          cat *.sha256 > checksums.txt
          rm -f *.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: agentgo ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
