name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.23', '1.24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: agent/go.sum

      - name: Tidy modules
        working-directory: agent
        run: go mod tidy -go=${{ matrix.go-version }}

      - name: Run tests
        working-directory: agent
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.24'
        uses: codecov/codecov-action@v4
        with:
          working-directory: agent
          files: coverage.txt
          flags: unittests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: agent/go.sum

      - name: Tidy modules
        working-directory: agent
        run: go mod tidy -go=1.24

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: agent
          version: latest
          args: --timeout=5m

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: agent/go.sum

      - name: Tidy modules
        working-directory: agent
        run: go mod tidy -go=1.24

      - name: Build
        working-directory: agent
        run: go build -o agentgo ./cmd/agentgo

      - name: Verify version
        working-directory: agent
        run: ./agentgo --version
